name: Sync to Gitee

on:
  push:
    branches: [master]

concurrency:
  group: sync-gitee
  cancel-in-progress: false

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Push to Gitee
        run: |
          git remote add gitee https://yaoyouzhong:${{ secrets.GITEE_TOKEN }}@gitee.com/yaoyouzhong/boss-resume-filter.git || true
          # Fetch latest ref from Gitee to avoid stale ref rejection
          git fetch gitee master || true
          git push gitee master --force || {
            echo "First push failed, re-fetching and retrying..."
            git fetch gitee master || true
            git push gitee master --force
          }
