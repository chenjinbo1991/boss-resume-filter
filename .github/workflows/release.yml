name: Build & Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  check:
    runs-on: ubuntu-latest
    outputs:
      needs: ${{ steps.check.outputs.needs }}
    steps:
      - name: Check existing release assets
        id: check
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TAG="${{ github.ref_name }}"
          needs='[]'

          assets=$(gh api "repos/${{ github.repository }}/releases/tags/$TAG" \
                   --jq '.assets[].name' 2>/dev/null || true)

          if ! echo "$assets" | grep -q '^BOSS_ResumeFilter\.exe$'; then
            needs=$(echo "$needs" | jq -c '. + [{"os":"windows-latest","platform":"windows"}]')
          fi

          if ! echo "$assets" | grep -q '^BOSS_ResumeFilter_mac\.zip$'; then
            needs=$(echo "$needs" | jq -c '. + [{"os":"macos-latest","platform":"macos"}]')
          fi

          echo "needs=$needs" >> "$GITHUB_OUTPUT"
          echo "Will build: $needs"

  build:
    needs: check
    if: needs.check.outputs.needs != '[]'
    strategy:
      fail-fast: false
      matrix:
        include: ${{ fromJSON(needs.check.outputs.needs) }}

    runs-on: ${{ matrix.os }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Set UTF-8 encoding
        shell: bash
        run: echo "PYTHONIOENCODING=utf-8" >> $GITHUB_ENV

      - name: Cache virtual environment
        uses: actions/cache@v4
        id: venv-cache
        with:
          path: .venv-ci
          key: venv-${{ runner.os }}-${{ hashFiles('requirements.txt') }}

      - name: Install dependencies (only on cache miss)
        if: steps.venv-cache.outputs.cache-hit != 'true'
        shell: bash
        run: |
          python -m venv .venv-ci
          if [ "$RUNNER_OS" = "Windows" ]; then
            .venv-ci/Scripts/pip install -r requirements.txt pyinstaller
          else
            .venv-ci/bin/pip install -r requirements.txt pyinstaller dmgbuild
          fi

      - name: Verify tkinter
        shell: bash
        run: |
          if [ "$RUNNER_OS" = "Windows" ]; then
            .venv-ci/Scripts/python -c "import tkinter; print('tkinter OK:', tkinter.TkVersion)"
          else
            .venv-ci/bin/python -c "import tkinter; print('tkinter OK:', tkinter.TkVersion)"
          fi

      - name: Build
        shell: bash
        run: |
          if [ "$RUNNER_OS" = "Windows" ]; then
            .venv-ci/Scripts/python build.py --ci --release
          else
            .venv-ci/bin/python build.py --ci --release
          fi
        env:
          PYTHONIOENCODING: utf-8

      - name: Upload to GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            dist/BOSS_ResumeFilter.exe
            dist/BOSS_ResumeFilter.dmg
            dist/BOSS_ResumeFilter_mac.zip
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload to Gitee Release
        if: ${{ secrets.GITEE_TOKEN != '' }}
        shell: bash
        run: |
          TAG="${{ github.ref_name }}"
          pip install requests >/dev/null 2>&1
          python -c "
          import requests, os, glob

          token = os.environ['GITEE_TOKEN']
          owner, repo = 'yaoyouzhong', 'boss-resume-filter'
          api_base = f'https://gitee.com/api/v5/repos/{owner}/{repo}'
          tag = '${TAG}'

          # Find or create release
          resp = requests.get(f'{api_base}/releases', params={'access_token': token}, timeout=10)
          resp.raise_for_status()
          release = next((r for r in resp.json() if r.get('tag_name') == tag), None)

          if release:
              release_id = release['id']
              existing = {a['name'] for a in release.get('assets', [])}
          else:
              resp = requests.post(f'{api_base}/releases', data={
                  'access_token': token,
                  'tag_name': tag,
                  'name': tag,
                  'body': f'CI build for {tag}',
                  'target_commitish': 'master',
              }, timeout=10)
              resp.raise_for_status()
              release_id = resp.json()['id']
              existing = set()

          # Upload built artifacts
          for pattern in ['dist/BOSS_ResumeFilter.exe', 'dist/BOSS_ResumeFilter.dmg', 'dist/BOSS_ResumeFilter_mac.zip']:
              files = glob.glob(pattern)
              for f in files:
                  name = os.path.basename(f)
                  if name in existing:
                      print(f'Skip {name} (already exists on Gitee)')
                      continue
                  with open(f, 'rb') as fh:
                      resp = requests.post(
                          f'{api_base}/releases/{release_id}/attach_files',
                          files={'file': (name, fh)},
                          params={'access_token': token},
                          timeout=300,
                      )
                  if resp.ok:
                      print(f'Uploaded {name} to Gitee Release')
                  else:
                      print(f'Failed to upload {name}: {resp.status_code}')
          "
        env:
          GITEE_TOKEN: ${{ secrets.GITEE_TOKEN }}
