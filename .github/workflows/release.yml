name: Build & Release

on:
  push:
    tags:
      - 'v*'
    paths:
      - '**.py'
      - 'requirements.txt'
      - 'job_config.json'
      - 'api_config.json'
      - 'selectors.json'
      - 'CHANGELOG.md'
      - '.github/workflows/release.yml'
    paths-ignore:
      - 'docs/**'
      - '*.md'
      - '!CHANGELOG.md'
      - 'gui.bat'
      - 'install.bat'
      - 'tests/**'
      - '.github/**'
      - '!.github/workflows/release.yml'

permissions:
  contents: write

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            platform: windows
          - os: macos-13
            platform: macos

    runs-on: ${{ matrix.os }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'

      - name: Set UTF-8 encoding
        shell: bash
        run: echo "PYTHONIOENCODING=utf-8" >> $GITHUB_ENV

      - name: Verify tkinter
        shell: bash
        run: python -c "import tkinter; print('tkinter OK:', tkinter.TkVersion)"

      - name: Install dependencies
        run: |
          pip install -r requirements.txt pyinstaller

      - name: Build
        run: python build.py --ci --release
        env:
          PYTHONIOENCODING: utf-8

      - name: Upload to GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            dist/BOSS_ResumeFilter.exe
            dist/BOSS_ResumeFilter.dmg
            dist/BOSS_ResumeFilter_mac.zip
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
